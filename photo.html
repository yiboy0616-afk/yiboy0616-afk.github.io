<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的家庭相册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fdf8f0;--bg-warm:#faf3e8;--surface:#fff;--surface-warm:#fef9f2;
  --accent:#c97b6b;--accent-light:#e8a898;--gold:#d4a853;--gold-light:#f0d48a;
  --brown:#5c3d2e;--brown-light:#8b6552;--text-primary:#3d2a1e;--text-muted:#9b8676;
  --shadow-warm:rgba(92,61,46,.08);--shadow-deep:rgba(92,61,46,.15);
  --radius:16px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Serif SC','Georgia',serif;
  background:var(--bg);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;
}
.bg-decor{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
.bg-decor::before{content:'';position:absolute;width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(212,168,83,.08) 0%,transparent 70%);border-radius:50%}
.bg-decor::after{content:'';position:absolute;width:500px;height:500px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(201,123,107,.06) 0%,transparent 70%);border-radius:50%}

header{text-align:center;padding:60px 20px 40px}
.header-icon{font-size:48px;margin-bottom:12px;display:inline-block;animation:gentlePulse 3s ease-in-out infinite}
@keyframes gentlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
header h1{
  font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;
  font-size:clamp(2rem,5vw,3.2rem);color:var(--brown);letter-spacing:.08em;margin-bottom:8px;
  background:linear-gradient(135deg,var(--brown) 0%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
header p{font-size:1rem;color:var(--text-muted);font-weight:300;letter-spacing:.15em}
.header-line{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0;border-radius:2px}

/* upload */
.upload-section{max-width:680px;margin:0 auto 48px;padding:0 20px;animation:fadeUp .8s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.upload-zone{
  display:block;border:2px dashed var(--accent-light);border-radius:var(--radius);
  padding:48px 32px;text-align:center;background:var(--surface-warm);
  cursor:pointer;transition:all .4s ease;user-select:none;
}
.upload-zone:hover{border-color:var(--accent);box-shadow:0 8px 32px var(--shadow-warm);transform:translateY(-2px)}
.upload-zone.dragover{border-color:var(--gold);background:rgba(212,168,83,.06);transform:scale(1.01)}
.upload-icon{font-size:52px;margin-bottom:16px;display:block;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.upload-zone h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.2rem;color:var(--brown);margin-bottom:8px;font-weight:400}
.upload-zone p{font-size:.85rem;color:var(--text-muted);margin-bottom:4px}
.upload-zone .upload-hint{font-size:.78rem;color:var(--text-muted);opacity:.7;margin-top:12px}
#fileInput{display:none}

/* stats */
.stats-bar{max-width:1200px;margin:0 auto 32px;padding:0 20px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp 1s ease forwards}
.stats-info{font-size:.9rem;color:var(--text-muted)}
.stats-info span{color:var(--accent);font-weight:600}
.clear-btn{padding:8px 20px;background:transparent;color:var(--text-muted);border:1.5px solid rgba(155,134,118,.3);border-radius:50px;font-family:'Noto Serif SC',serif;font-size:.8rem;cursor:pointer;transition:all .3s ease}
.clear-btn:hover{border-color:var(--accent);color:var(--accent)}

/* gallery */
.gallery-section{max-width:1200px;margin:0 auto;padding:0 20px 80px}
.empty-state{text-align:center;padding:80px 20px;animation:fadeUp 1s ease forwards}
.empty-state .empty-icon{font-size:72px;margin-bottom:20px;opacity:.6;display:block}
.empty-state h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.3rem;color:var(--brown-light);margin-bottom:8px;font-weight:400}
.empty-state p{color:var(--text-muted);font-size:.9rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.photo-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  box-shadow:0 2px 16px var(--shadow-warm);transition:all .4s cubic-bezier(.25,.46,.45,.94);
  position:relative;cursor:pointer;opacity:0;transform:translateY(30px);animation:cardIn .6s ease forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.photo-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px var(--shadow-deep)}
.photo-card .img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative;background:var(--bg-warm)}
.photo-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.25,.46,.45,.94)}
.photo-card:hover .img-wrap img{transform:scale(1.06)}
.photo-card .img-wrap .overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(61,42,30,.5) 0%,transparent 50%);
  opacity:0;transition:opacity .3s ease;
  display:flex;align-items:flex-end;justify-content:center;padding:16px;
}
.photo-card:hover .overlay{opacity:1}
.overlay .view-hint{color:rgba(255,255,255,.9);font-size:.8rem;letter-spacing:.1em}
.photo-card .card-info{padding:16px 18px}
.photo-card .card-info .caption-text{font-size:.95rem;color:var(--text-primary);margin-bottom:6px;line-height:1.5;min-height:1.5em}
.photo-card .card-info .photo-date{font-size:.75rem;color:var(--text-muted);letter-spacing:.05em}

/* action buttons - 关键修改：始终可见 */
.card-actions{
  position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:3;
  opacity:.35;transition:opacity .25s ease;
}
.photo-card:hover .card-actions{opacity:1}
.act-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.1);
  pointer-events:auto;
}
.act-btn:hover{background:var(--accent);transform:scale(1.12)}
.act-btn[data-action="delete"]:hover{background:#d9534f}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(30,20,15,.92);backdrop-filter:blur(12px);z-index:10000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.lightbox.active{display:flex}
.lb-close{position:absolute;top:24px;right:28px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:22px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;z-index:10}
.lb-close:hover{background:rgba(255,255,255,.2);transform:rotate(90deg)}
.lb-content{max-width:90vw;max-height:75vh;display:flex;align-items:center;justify-content:center}
.lb-content img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:var(--radius-sm);box-shadow:0 20px 80px rgba(0,0,0,.4);animation:lbIn .4s ease}
@keyframes lbIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.lb-caption-area{margin-top:20px;text-align:center;max-width:500px}
.lb-caption-area p{color:rgba(255,255,255,.85);font-size:1rem;margin-bottom:6px;line-height:1.6}
.lb-caption-area .lb-date{color:rgba(255,255,255,.4);font-size:.8rem}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center}
.lb-nav:hover{background:rgba(255,255,255,.18)}
.lb-prev{left:24px}.lb-next{right:24px}

/* caption modal */
.modal-overlay{position:fixed;inset:0;background:rgba(30,20,15,.7);backdrop-filter:blur(6px);z-index:10001;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius);padding:36px 32px;max-width:440px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:modalIn .35s ease}
@keyframes modalIn{from{transform:translateY(20px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-box h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.2rem;color:var(--brown);margin-bottom:20px;font-weight:400}
.modal-box textarea{width:100%;padding:14px 16px;border:1.5px solid rgba(155,134,118,.25);border-radius:var(--radius-sm);font-family:'Noto Serif SC',serif;font-size:.95rem;color:var(--text-primary);background:var(--bg-warm);resize:vertical;min-height:80px;transition:border-color .3s ease;outline:none}
.modal-box textarea:focus{border-color:var(--accent)}
.modal-box textarea::placeholder{color:var(--text-muted);opacity:.6}
.modal-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.modal-actions button{padding:10px 28px;border-radius:50px;font-family:'Noto Serif SC',serif;font-size:.9rem;cursor:pointer;transition:all .25s ease}
.btn-cancel{background:transparent;color:var(--text-muted);border:1.5px solid rgba(155,134,118,.25)}
.btn-cancel:hover{border-color:var(--text-muted)}
.btn-save{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border:none;box-shadow:0 4px 16px rgba(201,123,107,.3)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,123,107,.4)}

/* confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(30,20,15,.65);backdrop-filter:blur(6px);z-index:12000;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:32px 28px;max-width:380px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:modalIn .3s ease;text-align:center}
.confirm-box .confirm-icon{font-size:42px;margin-bottom:14px;display:block}
.confirm-box p{font-size:.95rem;color:var(--text-primary);margin-bottom:24px;line-height:1.6}
.confirm-box .confirm-actions{display:flex;gap:12px;justify-content:center}
.confirm-box .confirm-actions button{padding:10px 28px;border-radius:50px;font-family:'Noto Serif SC',serif;font-size:.9rem;cursor:pointer;transition:all .25s ease}
.confirm-no{background:transparent;color:var(--text-muted);border:1.5px solid rgba(155,134,118,.25)}
.confirm-no:hover{border-color:var(--text-muted)}
.confirm-yes{background:#d9534f;color:#fff;border:none;box-shadow:0 4px 16px rgba(217,83,79,.3)}
.confirm-yes:hover{background:#c9302c;transform:translateY(-1px)}

footer{text-align:center;padding:40px 20px 48px;border-top:1px solid rgba(155,134,118,.12);max-width:600px;margin:0 auto}
footer .heart{color:var(--accent);display:inline-block;animation:heartbeat 1.5s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
footer p{font-size:.82rem;color:var(--text-muted);line-height:1.8}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:14px 28px;background:var(--brown);color:#fff;border-radius:50px;font-family:'Noto Serif SC',serif;font-size:.88rem;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:20000;opacity:0;transition:all .4s cubic-bezier(.25,.46,.45,.94);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.progress-overlay{position:fixed;inset:0;background:rgba(30,20,15,.6);backdrop-filter:blur(6px);z-index:15000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.progress-overlay.active{display:flex}
.progress-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold-light);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-overlay p{color:rgba(255,255,255,.8);font-size:.9rem}

@media(max-width:600px){
  header{padding:40px 16px 28px}
  .upload-zone{padding:36px 20px}
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .photo-card .card-info{padding:12px 14px}
  .photo-card .card-info .caption-text{font-size:.85rem}
  .stats-bar{flex-direction:column;gap:12px}
  .lb-nav{width:40px;height:40px;font-size:16px}
  .lb-prev{left:10px}.lb-next{right:10px}
  .card-actions{opacity:.5}
}
</style>
</head>
<body>
<div class="bg-decor"></div>

<header>
  <span class="header-icon">🏡</span>
  <h1>我们的家庭相册</h1>
  <p>珍藏每一份温暖与美好</p>
  <div class="header-line"></div>
</header>

<section class="upload-section">
  <label class="upload-zone" for="fileInput" id="uploadZone">
    <span class="upload-icon">📷</span>
    <h3>把美好的瞬间放进这里</h3>
    <p>点击此区域或拖拽照片到此处</p>
    <div class="upload-hint">支持 JPG、PNG、GIF 等常见图片格式，可多选</div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </label>
</section>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stats-info">共 <span id="photoCount">0</span> 张照片，记录着我们的故事</div>
  <button type="button" class="clear-btn" id="clearBtn">清空相册</button>
</div>

<section class="gallery-section">
  <div class="empty-state" id="emptyState">
    <span class="empty-icon">🎞️</span>
    <h3>相册还是空的</h3>
    <p>上传第一张照片，开始记录美好时光吧</p>
  </div>
  <div class="photo-grid" id="photoGrid"></div>
</section>

<div class="lightbox" id="lightbox">
  <button type="button" class="lb-close" id="lbClose">✕</button>
  <button type="button" class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button type="button" class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-content"><img id="lbImg" src="" alt=""></div>
  <div class="lb-caption-area">
    <p id="lbCaption"></p>
    <div class="lb-date" id="lbDate"></div>
  </div>
</div>

<div class="modal-overlay" id="captionModal">
  <div class="modal-box">
    <h3>写下这一刻的记忆</h3>
    <textarea id="captionInput" placeholder="例如：2024年春节，全家人一起吃年夜饭..." rows="3"></textarea>
    <div class="modal-actions">
      <button type="button" class="btn-cancel" id="modalCancel">取消</button>
      <button type="button" class="btn-save" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <span class="confirm-icon">🗑️</span>
    <p id="confirmText">确定要删除这张照片吗？</p>
    <div class="confirm-actions">
      <button type="button" class="confirm-no" id="confirmNo">再想想</button>
      <button type="button" class="confirm-yes" id="confirmYes">确认删除</button>
    </div>
  </div>
</div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-spinner"></div>
  <p id="progressText">正在处理照片...</p>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>用 <span class="heart">♥</span> 记录每一个值得珍藏的瞬间</p>
  <p style="margin-top:6px;opacity:.6">照片仅保存在您的浏览器本地，不会上传至任何服务器</p>
</footer>

<script>
// ============================================================
//  元素
// ============================================================
var fileInput      = document.getElementById('fileInput');
var uploadZone     = document.getElementById('uploadZone');
var photoGrid      = document.getElementById('photoGrid');
var emptyState     = document.getElementById('emptyState');
var statsBar       = document.getElementById('statsBar');
var photoCount     = document.getElementById('photoCount');
var clearBtn       = document.getElementById('clearBtn');
var lightbox       = document.getElementById('lightbox');
var lbImg          = document.getElementById('lbImg');
var lbCaption      = document.getElementById('lbCaption');
var lbDate         = document.getElementById('lbDate');
var lbClose        = document.getElementById('lbClose');
var lbPrev         = document.getElementById('lbPrev');
var lbNext         = document.getElementById('lbNext');
var captionModal   = document.getElementById('captionModal');
var captionInput   = document.getElementById('captionInput');
var modalCancel    = document.getElementById('modalCancel');
var modalSave      = document.getElementById('modalSave');
var confirmDialog  = document.getElementById('confirmDialog');
var confirmText    = document.getElementById('confirmText');
var confirmNo      = document.getElementById('confirmNo');
var confirmYes     = document.getElementById('confirmYes');
var progressOverlay= document.getElementById('progressOverlay');
var progressText   = document.getElementById('progressText');
var toastEl        = document.getElementById('toast');

// ============================================================
//  状态
// ============================================================
var STORAGE_KEY = 'family_album_photos';
var photos      = loadPhotos();
var lbIndex     = 0;
var editingId   = null;
var deleteId    = null;       // 待删除的照片 ID
var confirmCb   = null;       // confirm 回调

// ============================================================
//  存储
// ============================================================
function loadPhotos() {
  try { var d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; }
  catch(e) { return []; }
}
function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(photos)); }
  catch(e) { showToast('存储空间不足，请清理部分照片'); }
}

// ============================================================
//  渲染相册
// ============================================================
function renderGallery() {
  if (photos.length === 0) {
    emptyState.style.display = 'block';
    statsBar.style.display   = 'none';
    photoGrid.innerHTML      = '';
    return;
  }
  emptyState.style.display = 'none';
  statsBar.style.display   = 'flex';
  photoCount.textContent   = photos.length;

  var html = '';
  for (var i = 0; i < photos.length; i++) {
    var p     = photos[i];
    var delay = Math.min(i * 0.05, 0.5);
    var cap   = p.caption ? esc(p.caption) : '<span style="color:var(--text-muted);font-style:italic">点击编辑添加描述</span>';
    html += '<div class="photo-card" data-idx="' + i + '" style="animation-delay:' + delay + 's">'
         +    '<div class="card-actions">'
         +      '<button type="button" class="act-btn" data-action="edit" data-id="' + p.id + '" title="编辑描述">✏️</button>'
         +      '<button type="button" class="act-btn" data-action="delete" data-id="' + p.id + '" title="删除照片">🗑️</button>'
         +    '</div>'
         +    '<div class="img-wrap">'
         +      '<img src="' + p.data + '" alt="家庭照片" loading="lazy">'
         +      '<div class="overlay"><span class="view-hint">点击查看大图</span></div>'
         +    '</div>'
         +    '<div class="card-info">'
         +      '<div class="caption-text">' + cap + '</div>'
         +      '<div class="photo-date">' + fmtDate(p.date) + '</div>'
         +    '</div>'
         + '</div>';
  }
  photoGrid.innerHTML = html;
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtDate(ds) {
  var d = new Date(ds);
  return d.getFullYear() + '年'
    + String(d.getMonth()+1).padStart(2,'0') + '月'
    + String(d.getDate()).padStart(2,'0')    + '日 '
    + String(d.getHours()).padStart(2,'0')   + ':'
    + String(d.getMinutes()).padStart(2,'0');
}

// ============================================================
//  上传
// ============================================================
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', function(e) { e.preventDefault(); uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
    processFiles(e.dataTransfer.files);
  }
});

fileInput.addEventListener('change', function() {
  var files = fileInput.files;
  if (files && files.length > 0) {
    processFiles(files);
  }
  fileInput.value = '';
});

function processFiles(fileList) {
  var imgs = [];
  for (var i = 0; i < fileList.length; i++) {
    if (fileList[i].type && fileList[i].type.indexOf('image') === 0) imgs.push(fileList[i]);
  }
  if (imgs.length === 0) { showToast('没有检测到图片文件'); return; }

  progressText.textContent = '正在处理 ' + imgs.length + ' 张照片...';
  progressOverlay.classList.add('active');

  var loaded = 0, total = imgs.length, batch = [];

  for (var j = 0; j < imgs.length; j++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(evt) {
        compress(evt.target.result, 1200, 0.8, function(result) {
          batch.push({
            id:       Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,6),
            data:     result,
            caption:  '',
            date:     new Date().toISOString()
          });
          loaded++;
          progressText.textContent = '正在处理 ' + loaded + ' / ' + total + ' ...';
          if (loaded === total) finish();
        });
      };
      reader.onerror = function() {
        loaded++;
        if (loaded === total) finish();
      };
      reader.readAsDataURL(file);
    })(imgs[j]);
  }

  function finish() {
    if (batch.length > 0) {
      photos = batch.concat(photos);
      saveToStorage();
      renderGallery();
    }
    progressOverlay.classList.remove('active');
    showToast(batch.length > 0 ? '成功添加 ' + batch.length + ' 张照片' : '照片处理失败');
  }
}

function compress(src, max, q, cb) {
  var img = new Image();
  img.onload = function() {
    var c = document.createElement('canvas');
    var w = img.width, h = img.height;
    if (w > max || h > max) { var r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', q));
  };
  img.onerror = function() { cb(src); };
  img.src = src;
}

// ============================================================
//  相册卡片点击 —— 事件委托（核心修复）
// ============================================================
photoGrid.addEventListener('click', function(e) {
  // 从点击目标向上找最近的带 data-action 的按钮
  var node = e.target;
  var btn  = null;
  // 最多向上遍历 8 层，避免死循环
  for (var depth = 0; depth < 8 && node && node !== photoGrid; depth++) {
    if (node.nodeType === 1 && node.hasAttribute && node.hasAttribute('data-action')) {
      btn = node;
      break;
    }
    node = node.parentNode;
  }

  if (btn) {
    var action = btn.getAttribute('data-action');
    var id     = btn.getAttribute('data-id');
    if (action === 'delete') {
      requestDelete(id);
    } else if (action === 'edit') {
      openCaptionModal(id);
    }
    return;   // 不再打开大图
  }

  // 没点到按钮 → 打开大图
  var card = findCard(e.target);
  if (card) {
    openLightbox(parseInt(card.getAttribute('data-idx'), 10));
  }
});

function findCard(el) {
  for (var i = 0; i < 10 && el && el !== photoGrid; i++) {
    if (el.nodeType === 1 && el.classList && el.classList.contains('photo-card')) return el;
    el = el.parentNode;
  }
  return null;
}

// ============================================================
//  自定义确认弹窗（替代 confirm()）
// ============================================================
function showConfirm(msg, cb) {
  confirmText.textContent = msg;
  confirmCb = cb;
  confirmDialog.classList.add('active');
}
function hideConfirm() {
  confirmDialog.classList.remove('active');
  confirmCb = null;
}
confirmNo.addEventListener('click', hideConfirm);
confirmYes.addEventListener('click', function() {
  var cb = confirmCb;
  hideConfirm();
  if (typeof cb === 'function') cb();
});
confirmDialog.addEventListener('click', function(e) {
  if (e.target === confirmDialog) hideConfirm();
});

// ============================================================
//  删除
// ============================================================
function requestDelete(id) {
  showConfirm('确定要删除这张照片吗？删除后无法恢复。', function() {
    var updated = [];
    for (var i = 0; i < photos.length; i++) {
      if (photos[i].id !== id) updated.push(photos[i]);
    }
    if (updated.length === photos.length) {
      showToast('未找到该照片，可能已被删除');
      return;
    }
    photos = updated;
    saveToStorage();
    renderGallery();
    showToast('照片已删除');
  });
}

clearBtn.addEventListener('click', function() {
  if (photos.length === 0) { showToast('相册已经是空的'); return; }
  showConfirm('确定要清空全部 ' + photos.length + ' 张照片吗？此操作无法撤销。', function() {
    photos = [];
    saveToStorage();
    renderGallery();
    showToast('相册已清空');
  });
});

// ============================================================
//  编辑描述
// ============================================================
function openCaptionModal(id) {
  editingId = id;
  var photo = findPhoto(id);
  captionInput.value = photo ? (photo.caption || '') : '';
  captionModal.classList.add('active');
  setTimeout(function() { captionInput.focus(); }, 150);
}
function closeCaptionModal() { captionModal.classList.remove('active'); editingId = null; }

modalCancel.addEventListener('click', closeCaptionModal);
modalSave.addEventListener('click', function() {
  var photo = findPhoto(editingId);
  if (photo) {
    photo.caption = captionInput.value.trim();
    saveToStorage();
    renderGallery();
    showToast('描述已保存');
  }
  closeCaptionModal();
});
captionModal.addEventListener('click', function(e) { if (e.target === captionModal) closeCaptionModal(); });

// ============================================================
//  大图灯箱
// ============================================================
function openLightbox(idx) { lbIndex = idx; updateLB(); lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLB()         { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
function navLB(d)          { lbIndex = (lbIndex + d + photos.length) % photos.length; updateLB(); }
function updateLB()        { var p = photos[lbIndex]; lbImg.src = p.data; lbCaption.textContent = p.caption || ''; lbDate.textContent = fmtDate(p.date); }

lbClose.addEventListener('click', closeLB);
lbPrev.addEventListener('click', function(e) { e.stopPropagation(); navLB(-1); });
lbNext.addEventListener('click', function(e) { e.stopPropagation(); navLB(1); });
lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLB(); });

// ============================================================
//  键盘
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (confirmDialog.classList.contains('active')) { hideConfirm(); return; }
    if (captionModal.classList.contains('active'))  { closeCaptionModal(); return; }
    if (lightbox.classList.contains('active'))       { closeLB(); return; }
  }
  if (lightbox.classList.contains('active')) {
    if (e.key === 'ArrowLeft')  navLB(-1);
    if (e.key === 'ArrowRight') navLB(1);
  }
});

// ============================================================
//  工具
// ============================================================
function findPhoto(id) {
  for (var i = 0; i < photos.length; i++) { if (photos[i].id === id) return photos[i]; }
  return null;
}

var toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2500);
}

// ============================================================
//  启动
// ============================================================
renderGallery();
</script>
</body>
</html>
